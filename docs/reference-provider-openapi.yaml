        '500':
          description: Lỗi máy chủ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  description: Mô tả chuyển động/nội dung
                model:
                  type: string
                  description: veo-3.1-quality | veo-3.1-fast | veo-3.1-lite | veo-3.1-lite-low-priority | omni-flash
                aspectRatio:
                  type: string
                  description: landscape | portrait; Veo còn hỗ trợ 1:1, 4:3, 3:4
                duration:
                  type: integer
                  description: 4 | 6 | 8 | 10 tùy model/mode
                count:
                  type: integer
                  description: 1-4
                seed:
                  type: integer
                  description: Số nguyên >= 0
                email:
                  type: string
                  description: Tài khoản hoặc tự cân bằng
                startImage:
                  type: string
                  description: Ảnh đầu cho I2V
                endImage:
                  type: string
                  description: Ảnh cuối, cần startImage
                referenceVideo_1:
                  type: string
                  description: Omni Flash V2V
                async:
                  type: boolean
                  description: true để trả job ngay
                replyUrl:
                  type: string
                  description: Webhook trạng thái
                replyRef:
                  type: string
                  description: Mã đối chiếu
              additionalProperties: true
              required:
              - prompt
