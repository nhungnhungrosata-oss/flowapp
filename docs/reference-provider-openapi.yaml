        '429':
          description: Giới hạn hoặc quota từ dịch vụ nền
        '500':
          description: Lỗi máy chủ
      parameters:
      - name: email
        in: path
        required: true
        schema:
          type: string
        description: Tài khoản sở hữu asset; tài liệu mô tả có thể bỏ qua khi hệ thống tự chọn
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
          video/mp4:
            schema:
              type: string
              format: binary
  /assets/{mediaGenerationId}:
    get:
      tags:
      - assets
      summary: Lấy URL tải asset
      operationId: get_assets_mediaGenerationId
      externalDocs:
        url: https://useapi.net/docs/api-google-flow-v1/get-google-flow-assets-mediagenerationid
