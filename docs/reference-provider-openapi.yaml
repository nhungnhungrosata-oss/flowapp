openapi: 3.1.0
info:
  title: useapi.net Google Flow API v1 – Integration Starter
  version: 2026-06-derived
  description: Bản OpenAPI khởi đầu được diễn giải từ tài liệu công khai. Hãy đối chiếu tài liệu chính thức trước
    khi triển khai production.
servers:
- url: https://api.useapi.net/v1/google-flow
security:
- bearerAuth: []
tags:
- name: accounts
- name: captcha
- name: assets
- name: images
- name: videos
- name: voices
- name: characters
- name: jobs
paths:
  /accounts:
    post:
      tags:
      - accounts
      summary: Cấu hình tài khoản Google Flow
      operationId: post_accounts
      externalDocs:
        url: https://useapi.net/docs/api-google-flow-v1/post-google-flow-accounts
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '201':
          description: Job đã được tạo (khi endpoint hỗ trợ async)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token không hợp lệ
        '429':
          description: Giới hạn hoặc quota từ dịch vụ nền
        '500':
          description: Lỗi máy chủ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cookies:
                  type: string
                  description: Bảng cookies lấy theo hướng dẫn thiết lập chính thức. Chỉ gửi từ môi trường backend
                    an toàn.
              additionalProperties: true
              required:
              - cookies
    get:
      tags:
      - accounts
      summary: Liệt kê tài khoản đã cấu hình
      operationId: get_accounts
      externalDocs:
        url: https://useapi.net/docs/api-google-flow-v1/get-google-flow-accounts
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '201':
          description: Job đã được tạo (khi endpoint hỗ trợ async)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token không hợp lệ
        '429':
          description: Giới hạn hoặc quota từ dịch vụ nền
        '500':
          description: Lỗi máy chủ
  /accounts/{email}:
    get:
      tags:
      - accounts
      summary: Xem một cấu hình tài khoản
      operationId: get_accounts_email
      externalDocs:
        url: https://useapi.net/docs/api-google-flow-v1/get-google-flow-accounts-email
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '201':
          description: Job đã được tạo (khi endpoint hỗ trợ async)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token không hợp lệ
        '429':
          description: Giới hạn hoặc quota từ dịch vụ nền
        '500':
          description: Lỗi máy chủ
      parameters:
      - name: email
        in: path
        required: true
        schema:
          type: string
        description: Địa chỉ email, cần URL-encode
    delete:
      tags:
      - accounts
      summary: Xóa cấu hình tài khoản
      operationId: delete_accounts_email
      externalDocs:
        url: https://useapi.net/docs/api-google-flow-v1/delete-google-flow-accounts-email
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '201':
          description: Job đã được tạo (khi endpoint hỗ trợ async)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token không hợp lệ
        '429':
          description: Giới hạn hoặc quota từ dịch vụ nền
        '500':
          description: Lỗi máy chủ
      parameters:
      - name: email
        in: path
        required: true
        schema:
          type: string
        description: Địa chỉ email, cần URL-encode
  /accounts/captcha-providers:
    post:
      tags:
      - captcha
      summary: Cấu hình nhà cung cấp captcha
      operationId: post_accounts_captcha_providers
      externalDocs:
        url: https://useapi.net/docs/api-google-flow-v1/post-google-flow-accounts-captcha-providers
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '201':
          description: Job đã được tạo (khi endpoint hỗ trợ async)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token không hợp lệ
        '429':
          description: Giới hạn hoặc quota từ dịch vụ nền
        '500':
          description: Lỗi máy chủ
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                CapSolver:
                  type: string
                  description: API key
                AntiCaptcha:
                  type: string
                  description: API key
                YesCaptcha:
                  type: string
                  description: API key
                SolveCaptcha:
                  type: string
                  description: API key
                2Captcha:
                  type: string
                  description: API key
                EzCaptcha:
                  type: string
                  description: API key
              additionalProperties: true
    get:
      tags:
      - captcha
      summary: Xem captcha providers đã cấu hình
      operationId: get_accounts_captcha_providers
      externalDocs:
        url: https://useapi.net/docs/api-google-flow-v1/get-google-flow-accounts-captcha-providers
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '201':
          description: Job đã được tạo (khi endpoint hỗ trợ async)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token không hợp lệ
        '429':
          description: Giới hạn hoặc quota từ dịch vụ nền
        '500':
          description: Lỗi máy chủ
  /accounts/captcha-stats:
    get:
      tags:
      - captcha
      summary: Thống kê hiệu quả captcha
      operationId: get_accounts_captcha_stats
      externalDocs:
        url: https://useapi.net/docs/api-google-flow-v1/get-google-flow-accounts-captcha-stats
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '201':
          description: Job đã được tạo (khi endpoint hỗ trợ async)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleResponse'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token không hợp lệ
        '429':
          description: Giới hạn hoặc quota từ dịch vụ nền
        '500':
          description: Lỗi máy chủ
      parameters:
      - name: date
        in: query
        required: false
        schema:
          type: string
        description: YYYY-MM-DD
      - name: limit
        in: query
        required: false
        schema:
          type: integer
        description: Tối đa 50000
      - name: provider
        in: query
        required: false
        schema:
          type: string
        description: Tên provider
      - name: anonymized
        in: query
        required: false
        schema:
          type: boolean
        description: Tổng hợp ẩn danh toàn hệ thống
  /assets:
    post:
      tags:
      - assets
      summary: Tải ảnh/video làm tài sản tham chiếu
      operationId: post_assets
      externalDocs:
        url: https://useapi.net/docs/api-google-flow-v1/post-google-flow-assets-email
