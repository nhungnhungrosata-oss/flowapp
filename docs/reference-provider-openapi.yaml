        '500':
          description: Lỗi máy chủ
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
          video/mp4:
            schema:
              type: string
              format: binary
  /assets/{email}:
    post:
      tags:
