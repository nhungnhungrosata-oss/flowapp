        '429':
          description: Giới hạn hoặc quota từ dịch vụ nền
        '500':
          description: Lỗi máy chủ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  description: Mô tả ảnh
                model:
                  type: string
                  description: imagen-4 | nano-banana-2 | nano-banana-pro
                aspectRatio:
                  type: string
                  description: 16:9 | 4:3 | 1:1 | 3:4 | 9:16 | auto
                count:
                  type: integer
                  description: 1-4
                seed:
                  type: integer
                  description: Số nguyên >= 0
                email:
                  type: string
                  description: Tài khoản; có thể để hệ thống cân bằng tải
                replyUrl:
                  type: string
                  description: Webhook
                replyRef:
                  type: string
                  description: Mã đối chiếu
              additionalProperties: true
              required:
              - prompt
  /images/upscale:
